name: Security Scan

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    # 毎週月曜 9:00 JST (0:00 UTC)
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  # CodeQL - コードの脆弱性静的解析
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python
        queries: security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:python"


  # Bandit - Pythonセキュリティ静的解析
  bandit:
    name: Bandit Security Linter
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Bandit
      run: pip install bandit[toml]

    - name: Run Bandit
      run: bandit -r src/ -f json -o bandit-report.json || true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json


  # Semgrep - 高精度Pythonセマンティック静的解析
  # 最適化: 1回のJSONスキャン → Python変換でSARIF生成 → 件数チェックでfail
  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1回のスキャンでJSONを取得（|| true で変換ステップまで必ず進む）
    - name: Run Semgrep (JSON)
      run: semgrep ci --config="p/python" --json -o semgrep-report.json || true

    # JSONからSARIFをPythonで変換（2回目のスキャン不要）
    - name: Convert Semgrep JSON to SARIF
      run: |
        python3 << 'EOF'
        import json
        with open('semgrep-report.json') as f:
            data = json.load(f)
        results = data.get('results', [])
        sarif = {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
                "tool": {"driver": {"name": "Semgrep", "version": "latest", "rules": []}},
                "results": [
                    {
                        "ruleId": r["check_id"],
                        "message": {"text": r["extra"]["message"]},
                        "locations": [{
                            "physicalLocation": {
                                "artifactLocation": {"uri": r["path"], "uriBaseId": "%SRCROOT%"},
                                "region": {"startLine": r["start"]["line"], "startColumn": r["start"]["col"]}
                            }
                        }],
                        "level": "error" if r["extra"].get("severity") in ["ERROR", "CRITICAL"] else "warning"
                    }
                    for r in results
                ]
            }]
        }
        with open('semgrep-results.sarif', 'w') as f:
            json.dump(sarif, f, indent=2)
        print(f"Converted {len(results)} findings to SARIF")
        EOF

    - name: Upload Semgrep JSON report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: semgrep-report
        path: semgrep-report.json

    - name: Upload Semgrep results to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: semgrep-results.sarif
        category: semgrep

    # findingsがあればここでfailしてPRを止める
    - name: Fail if Semgrep findings exist
      run: |
        COUNT=$(jq '.results | length' semgrep-report.json 2>/dev/null || echo 0)
        if [ "$COUNT" -gt "0" ]; then
          echo "❌ Semgrep found ${COUNT} issue(s)."
          exit 1
        fi


  # Trivy - 包括的な脆弱性スキャン
  # 最適化: 1回のJSONスキャン（fail） → trivy convertでSARIF生成
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    # 1回のスキャンでJSONを取得（CRITICAL/HIGH/MEDIUM検知でfailしてPRを止める）
    - name: Run Trivy (JSON / fail on findings)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'json'
        output: 'trivy-results.json'
        severity: 'CRITICAL,HIGH,MEDIUM'
        exit-code: '1'

    # trivy convertでJSONからSARIFに変換（2回目のスキャン不要）
    - name: Convert Trivy JSON to SARIF
      if: always()
      run: trivy convert --format sarif --output trivy-results.sarif trivy-results.json || true

    - name: Upload Trivy SARIF to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        category: trivy

    - name: Upload Trivy JSON artifact
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: trivy-json
        path: trivy-results.json


  # Bun Audit - Node.js(Bun)依存関係の既知脆弱性チェック
  bun-audit:
    name: Bun Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Run Bun Audit
      working-directory: docs/site
      run: bun audit


  # Grype - 脆弱性スキャン (OS/Python/JS)
  # 最適化: anchore/scan-actionを廃止しgrype CLIで1回実行 → JSON+SARIFを同時出力
  grype:
    name: Grype Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Grype
      run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

    # 1回のスキャンでJSON+SARIFを同時出力（medium以上でfailしてPRを止める）
    - name: Run Grype (JSON + SARIF / fail on medium+)
      run: |
        grype dir:. \
          -o json=grype-results.json \
          -o sarif=grype-results.sarif \
          --fail-on medium

    - name: Upload Grype SARIF to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: grype-results.sarif
        category: grype

    - name: Upload Grype JSON artifact
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: grype-json
        path: grype-results.json


  # セキュリティサマリー
  # security-reportジョブを統合: 件数+具体内容 / PRコメント / 合否判定 / レポートアーティファクト
  summary:
    name: Security Summary
    needs: [codeql, bandit, semgrep, trivy, bun-audit, grype]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    # 全ツールのJSONを解析して件数と具体的な内容を抽出
    - name: Parse findings
      id: findings
      run: |
        mkdir -p finding-details

        parse_count() {
          local file=$1 query=$2
          [ -f "$file" ] && jq "$query" "$file" 2>/dev/null || echo "0"
        }

        # Bandit
        BANDIT_COUNT=$(parse_count \
          artifacts/bandit-report/bandit-report.json \
          '[.results[]] | length')
        jq -r '.results[]? | "[\(.issue_severity)] \(.issue_text)\n  File: \(.filename):\(.line_number)\n"' \
          artifacts/bandit-report/bandit-report.json 2>/dev/null | head -n 80 \
          > finding-details/bandit.txt || true
        touch finding-details/bandit.txt

        # Semgrep
        SEMGREP_COUNT=$(parse_count \
          artifacts/semgrep-report/semgrep-report.json \
          '[.results[]] | length')
        jq -r '.results[]? | "[\(.extra.severity)] \(.check_id)\n  \(.extra.message)\n  File: \(.path):\(.start.line)\n"' \
          artifacts/semgrep-report/semgrep-report.json 2>/dev/null | head -n 80 \
          > finding-details/semgrep.txt || true
        touch finding-details/semgrep.txt

        # Trivy
        TRIVY_COUNT=$(parse_count \
          artifacts/trivy-json/trivy-results.json \
          '[.Results[]?.Vulnerabilities // [] | .[]] | length')
        jq -r '.Results[]?.Vulnerabilities[]? | "[\(.Severity)] \(.VulnerabilityID) \(.PkgName)@\(.InstalledVersion)\n  \(.Title // "no title")\n"' \
          artifacts/trivy-json/trivy-results.json 2>/dev/null | head -n 80 \
          > finding-details/trivy.txt || true
        touch finding-details/trivy.txt

        # Grype
        GRYPE_COUNT=$(parse_count \
          artifacts/grype-json/grype-results.json \
          '[.matches[]] | length')
        jq -r '.matches[]? | "[\(.vulnerability.severity)] \(.vulnerability.id) \(.artifact.name)@\(.artifact.version)\n"' \
          artifacts/grype-json/grype-results.json 2>/dev/null | head -n 80 \
          > finding-details/grype.txt || true
        touch finding-details/grype.txt

        echo "bandit_count=${BANDIT_COUNT}"   >> $GITHUB_OUTPUT
        echo "semgrep_count=${SEMGREP_COUNT}" >> $GITHUB_OUTPUT
        echo "trivy_count=${TRIVY_COUNT}"     >> $GITHUB_OUTPUT
        echo "grype_count=${GRYPE_COUNT}"     >> $GITHUB_OUTPUT

    # Actionsサマリーに件数テーブル + 具体的な内容を出力
    - name: Create summary
      run: |
        echo "## 🛡️ Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status | Findings |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|----------|" >> $GITHUB_STEP_SUMMARY
        echo "| **CodeQL**    | ${{ needs.codeql.result == 'success' && '✅ Passed' || '❌ Failed' }}        | [Security Tab参照](../../security/code-scanning) |" >> $GITHUB_STEP_SUMMARY
        echo "| **Bandit**    | ${{ needs.bandit.result == 'success' && '✅ Passed' || '⚠️ Check logs' }}   | ${{ steps.findings.outputs.bandit_count }}件 |" >> $GITHUB_STEP_SUMMARY
        echo "| **Semgrep**   | ${{ needs.semgrep.result == 'success' && '✅ Passed' || '⚠️ Check logs' }}  | ${{ steps.findings.outputs.semgrep_count }}件 |" >> $GITHUB_STEP_SUMMARY
        echo "| **Trivy**     | ${{ needs.trivy.result == 'success' && '✅ Passed' || '⚠️ Check logs' }}   | ${{ steps.findings.outputs.trivy_count }}件 |" >> $GITHUB_STEP_SUMMARY
        echo "| **Bun Audit** | ${{ needs.bun-audit.result == 'success' && '✅ Passed' || '❌ Failed' }}    | (ログ参照) |" >> $GITHUB_STEP_SUMMARY
        echo "| **Grype**     | ${{ needs.grype.result == 'success' && '✅ Passed' || '⚠️ Check logs' }}   | ${{ steps.findings.outputs.grype_count }}件 |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        declare -A LABELS=(
          [bandit]="🐍 Bandit Findings"
          [semgrep]="🔎 Semgrep Findings"
          [trivy]="📦 Trivy Findings"
          [grype]="🔍 Grype Findings"
        )
        for tool in bandit semgrep trivy grype; do
          if [ -s "finding-details/${tool}.txt" ]; then
            echo "### ${LABELS[$tool]}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "finding-details/${tool}.txt" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
        done

    # PRに件数+具体内容をコメント投稿（再実行時は既存コメントを上書き更新）
    - name: Post PR Comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v8
      with:
        script: |
          const fs = require('fs');

          const icon = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
          const results = {
            codeql:   '${{ needs.codeql.result }}',
            bandit:   '${{ needs.bandit.result }}',
            semgrep:  '${{ needs.semgrep.result }}',
            trivy:    '${{ needs.trivy.result }}',
            bunAudit: '${{ needs.bun-audit.result }}',
            grype:    '${{ needs.grype.result }}'
          };
          const counts = {
            bandit:  '${{ steps.findings.outputs.bandit_count }}'  || '0',
            semgrep: '${{ steps.findings.outputs.semgrep_count }}' || '0',
            trivy:   '${{ steps.findings.outputs.trivy_count }}'   || '0',
            grype:   '${{ steps.findings.outputs.grype_count }}'   || '0',
          };
          const readDetail = (file) => {
            try { return fs.readFileSync(file, 'utf8').trim(); } catch { return ''; }
          };
          const details = {
            bandit:  readDetail('finding-details/bandit.txt'),
            semgrep: readDetail('finding-details/semgrep.txt'),
            trivy:   readDetail('finding-details/trivy.txt'),
            grype:   readDetail('finding-details/grype.txt'),
          };
          const allPassed = Object.values(results).every(r => r === 'success');

          let body = [
            '## 🛡️ Security Scan Results',
            '',
            '| スキャナ | 役割 | 結果 | Findings |',
            '|---------|------|------|----------|',
            `| **CodeQL**    | Python深層データフロー解析        | ${icon(results.codeql)}   \`${results.codeql}\`   | [Security Tab参照](../../security/code-scanning) |`,
            `| **Bandit**    | Python静的解析                   | ${icon(results.bandit)}   \`${results.bandit}\`   | ${counts.bandit}件 |`,
            `| **Semgrep**   | Pythonセマンティック解析          | ${icon(results.semgrep)}  \`${results.semgrep}\`  | ${counts.semgrep}件 |`,
            `| **Trivy**     | 依存関係 / IaC / シークレット     | ${icon(results.trivy)}    \`${results.trivy}\`    | ${counts.trivy}件 |`,
            `| **Bun Audit** | Node.js依存関係                  | ${icon(results.bunAudit)} \`${results.bunAudit}\` | (ログ参照) |`,
            `| **Grype**     | 深堀り脆弱性スキャン              | ${icon(results.grype)}    \`${results.grype}\`    | ${counts.grype}件 |`,
            '',
          ].join('\n');

          // findingsがあるツールだけ <details> で折り畳んで具体的な内容を追記
          const tools = [
            { name: '🐍 Bandit',  key: 'bandit'  },
            { name: '🔎 Semgrep', key: 'semgrep' },
            { name: '📦 Trivy',   key: 'trivy'   },
            { name: '🔍 Grype',   key: 'grype'   },
          ];
          for (const t of tools) {
            if (parseInt(counts[t.key]) > 0 && details[t.key]) {
              body += `\n<details>\n<summary>${t.name} Findings（${counts[t.key]}件）― クリックして展開</summary>\n\n\`\`\`\n${details[t.key]}\n\`\`\`\n</details>\n`;
            }
          }

          body += '\n' + (allPassed
            ? '### ✅ 全チェックが通過しました！'
            : '### ❌ 1つ以上のセキュリティチェックが失敗しています。マージ前に修正してください。');
          body += '\n\n> 🔍 詳細・行ハイライトはリポジトリの **Security → Code scanning** タブで確認できます。';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes('🛡️ Security Scan Results'));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
          }

    - name: Verify all checks passed
      if: always()
      run: |
        echo ""
        echo "📝 Job statuses:"
        echo "📝 codeql    → ${{ needs.codeql.result == 'success' && '✓ success' || format('✗ {0}', needs.codeql.result) }} [required]"
        echo "📝 bandit    → ${{ needs.bandit.result == 'success' && '✓ success' || format('✗ {0}', needs.bandit.result) }} [required]"
        echo "📝 semgrep   → ${{ needs.semgrep.result == 'success' && '✓ success' || format('✗ {0}', needs.semgrep.result) }} [required]"
        echo "📝 trivy     → ${{ needs.trivy.result == 'success' && '✓ success' || format('✗ {0}', needs.trivy.result) }} [required]"
        echo "📝 bun-audit → ${{ needs.bun-audit.result == 'success' && '✓ success' || format('✗ {0}', needs.bun-audit.result) }} [required]"
        echo "📝 grype     → ${{ needs.grype.result == 'success' && '✓ success' || format('✗ {0}', needs.grype.result) }} [required]"
        echo ""

        FAILED=false
        if [[ "${{ needs.codeql.result }}" != "success" ]]; then FAILED=true; fi
        if [[ "${{ needs.bandit.result }}" != "success" ]]; then FAILED=true; fi
        if [[ "${{ needs.semgrep.result }}" != "success" ]]; then FAILED=true; fi
        if [[ "${{ needs.trivy.result }}" != "success" ]]; then FAILED=true; fi
        if [[ "${{ needs.bun-audit.result }}" != "success" ]]; then FAILED=true; fi
        if [[ "${{ needs.grype.result }}" != "success" ]]; then FAILED=true; fi

        if [ "$FAILED" = true ]; then
          echo "❌ One or more security checks failed."
          exit 1
        else
          echo "# ✓ All security checks succeeded 🎉🎉🎉"
        fi

    # security-reportジョブを統合: finding-detailsをアーティファクトとして保存
    - name: Upload Full Security Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: full-security-report
        path: finding-details/
