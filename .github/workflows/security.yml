name: Security Scan

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    # 毎週月曜 9:00 JST (0:00 UTC)
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # CodeQL - コードの脆弱性静的解析
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python
        queries: security-and-quality
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:python"


  # Bandit - Pythonセキュリティ静的解析
  bandit:
    name: Bandit Security Linter
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install Bandit
      run: pip install bandit[toml]
    
    - name: Run Bandit
      run: bandit -r src/ -f json -o bandit-report.json || true
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json

  # Trivy - 包括的な脆弱性スキャン
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Bun Audit - Node.js(Bun)依存関係の既知脆弱性チェック
  bun-audit:
    name: Bun Audit
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
        
    - name: Run Bun Audit
      working-directory: docs/site
      run: bun audit

  # セキュリティサマリー
  summary:
    name: Security Summary
    needs: [codeql, bandit, trivy, bun-audit, grype]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Create summary
      run: |
        echo "## 🛡️ Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| CodeQL | ${{ needs.codeql.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Bandit | ${{ needs.bandit.result == 'success' && '✅ Passed' || '⚠️ Check logs' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Trivy | ${{ needs.trivy.result == 'success' && '✅ Passed' || '⚠️ Check logs' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Bun Audit | ${{ needs.bun-audit.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Grype | ${{ needs.grype.result == 'success' && '✅ Passed' || '⚠️ Check logs' }} |" >> $GITHUB_STEP_SUMMARY

    - name: Verify all checks passed
      if: always()
      run: |
        echo ""
        echo "📝 Job statuses:"
        echo "📝 codeql → ${{ needs.codeql.result == 'success' && '✓ success' || format('✗ {0}', needs.codeql.result) }} [required]"
        echo "📝 bandit → ${{ needs.bandit.result == 'success' && '✓ success' || format('✗ {0}', needs.bandit.result) }} [required]"
        echo "📝 trivy → ${{ needs.trivy.result == 'success' && '✓ success' || format('✗ {0}', needs.trivy.result) }} [required]"
        echo "📝 bun-audit → ${{ needs.bun-audit.result == 'success' && '✓ success' || format('✗ {0}', needs.bun-audit.result) }} [required]"
        echo "📝 grype → ${{ needs.grype.result == 'success' && '✓ success' || format('✗ {0}', needs.grype.result) }} [required]"
        echo ""
        
        # Check for failures
        FAILED=false
        if [[ "${{ needs.codeql.result }}" != "success" ]]; then FAILED=true; fi
        if [[ "${{ needs.bandit.result }}" != "success" ]]; then FAILED=true; fi
        if [[ "${{ needs.trivy.result }}" != "success" ]]; then FAILED=true; fi
        if [[ "${{ needs.bun-audit.result }}" != "success" ]]; then FAILED=true; fi
        if [[ "${{ needs.grype.result }}" != "success" ]]; then FAILED=true; fi
        
        if [ "$FAILED" = true ]; then
          echo "❌ One or more security checks failed."
          exit 1
        else
          echo "# ✓ All security checks succeeded 🎉🎉🎉"
        fi

  # Grype - 脆弱性スキャン (OS/Python/JS)
  grype:
    name: Grype Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Scan for vulnerabilities
      uses: anchore/scan-action@v7
      with:
        path: "."
        fail-build: false # レポート集約のため、ここでは落とさない（後のステップで判定）
        output-format: json
    
    - name: Upload Grype report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: grype-results
        path: results.json

  # セキュリティレポート集約
  security-report:
    name: Generate Security Report
    needs: [codeql, bandit, trivy, bun-audit, grype]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts

    - name: Generate Detailed Report
      run: |
        echo "# 🛡️ Comprehensive Security Report" > security-report.md
        echo "Generated at: $(date -u)" >> security-report.md
        echo "" >> security-report.md
        
        echo "## 🔍 Detailed Findings" >> security-report.md
        echo "*(If any issues are found, they will be listed below)*" >> security-report.md
        echo "" >> security-report.md
        
        # Grype Findings
        if [ -f artifacts/grype-results/results.json ] && jq -e '.matches | length > 0' artifacts/grype-results/results.json > /dev/null; then
            echo "### 📦 Grype Scan Results" >> security-report.md
            # JSON解析してMarkdownに変換 (簡易的なjq処理)
            echo "\`\`\`json" >> security-report.md
            jq -r '.matches[] | "Title: " + .vulnerability.id + "\nPackage: " + .artifact.name + " (" + .artifact.version + ")\nSeverity: " + .vulnerability.severity + "\nLink: " + .vulnerability.dataSource + "\n---"' artifacts/grype-results/results.json | head -n 50 >> security-report.md || echo "Parse error" >> security-report.md
            echo "\`\`\`" >> security-report.md
        fi

        # Bandit Findings
        if [ -f artifacts/bandit-report/bandit-report.json ] && jq -e '.results | length > 0' artifacts/bandit-report/bandit-report.json > /dev/null; then
            echo "### 🐍 Bandit Scan Results" >> security-report.md
            echo "\`\`\`json" >> security-report.md
            jq -r '.results[] | "Issue: " + .issue_text + "\nSeverity: " + .issue_severity + "\nFile: " + .filename + ":" + (.line_number|tostring) + "\n---"' artifacts/bandit-report/bandit-report.json | head -n 50 >> security-report.md || echo "Parse error" >> security-report.md
            echo "\`\`\`" >> security-report.md
        fi

        cat security-report.md >> $GITHUB_STEP_SUMMARY

    - name: Upload Full Report
      uses: actions/upload-artifact@v7
      with:
        name: full-security-report
        path: security-report.md

