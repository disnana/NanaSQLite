sonar.projectKey=disnana_NanaSQLite
sonar.organization=disnana
sonar.sources=src
sonar.tests=tests
sonar.exclusions=scripts/**,docs/**
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Ignore "meddling" rules for the core library files
sonar.issue.ignore.multicriteria=m1,m2,m3,m4,m5
# Cognitive Complexity (keep it high for single-file design)
sonar.issue.ignore.multicriteria.m1.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.m1.resourceKey=src/nanasqlite/*.py
# Commented-out code (docstrings/comments false positives)
sonar.issue.ignore.multicriteria.m2.ruleKey=python:S125
sonar.issue.ignore.multicriteria.m2.resourceKey=src/nanasqlite/*.py
# Duplicate String Literals
sonar.issue.ignore.multicriteria.m3.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.m3.resourceKey=src/nanasqlite/*.py
# Unnecessary list() call (which is actually necessary for mutation)
sonar.issue.ignore.multicriteria.m4.ruleKey=python:S3001
sonar.issue.ignore.multicriteria.m4.resourceKey=src/nanasqlite/utils.py
# ReDoS vulnerabilities (reverted by user, now ignored)
sonar.issue.ignore.multicriteria.m5.ruleKey=python:S5852
sonar.issue.ignore.multicriteria.m5.resourceKey=src/nanasqlite/core.py
