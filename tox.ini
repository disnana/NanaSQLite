[tox]
envlist = lint, type, test, test-speed
skipsdist = true

[testenv:lint]
description = Run ruff linter
deps = ruff>=0.8.0
commands = ruff check src/nanasqlite tests --output-format=github

[testenv:type]
description = Run mypy type checker
deps = 
    setuptools<80
    typing_extensions>=4.12.2
    mypy>=1.13.0,<1.19
    apsw
commands = mypy src/nanasqlite --no-strict-optional

[testenv:format]
description = Format code with ruff
deps = ruff>=0.8.0
commands = ruff format src/nanasqlite tests

[testenv:fix]
description = Auto-fix linting issues
deps = ruff>=0.8.0
commands = ruff check src/nanasqlite tests --fix

[testenv:test]
description = Run pytest test suite
deps =
    -e .[dev]
setenv =
    PYTHONPATH = {toxinidir}/src
commands =
    pytest -v --tb=short --cov=nanasqlite --cov-report=xml:coverage.xml --cov-report=term-missing

[testenv:test-speed]
description = Run pytest with speed extras (orjson path)
deps =
    -e .[dev,speed]
setenv =
    PYTHONPATH = {toxinidir}/src
commands =
    pytest -v --tb=short -k ""
